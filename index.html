    <style>
        .reveal { 
            opacity: 0; 
            transform: translateY(30px); 
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); 
            filter: blur(5px); 
        }
        .reveal.visible { 
            opacity: 1; 
            transform: translateY(0); 
            filter: blur(0); 
        }

        .animate-slide-right { 
            animation: slideRight 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        .animate-draw-stroke { 
            animation: drawStroke 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            opacity: 0; 
        }

        @keyframes slideRight { 
            0% { transform: translateX(-30px); opacity: 0; filter: blur(5px); } 
            100% { transform: translateX(0); opacity: 1; filter: blur(0); } 
        }
        @keyframes drawStroke { 
            0% { opacity: 0; transform: scale(1.05); filter: blur(10px); } 
            100% { opacity: 1; transform: scale(1); filter: blur(0); } 
        }

        const RollingCounter = ({ target, trigger }) => {
          const [count, setCount] = useState(0);
          useEffect(() => {
            if (!trigger) return;
            let startTimestamp = null;
            const duration = 2000;
            const step = (timestamp) => {
              if (!startTimestamp) startTimestamp = timestamp;
              const progress = Math.min((timestamp - startTimestamp) / duration, 1);
              const easeOutQuad = (t) => t * (2 - t);
              setCount(Math.floor(easeOutQuad(progress) * target));
              if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
          }, [target, trigger]);
          return <span>{count}</span>;
        };

        const StatItem = ({ target, label, subLabel }) => {
          const [isVisible, setIsVisible] = useState(false);
          const domRef = useRef();
          useEffect(() => {
            const observer = new IntersectionObserver(entries => {
              if (entries[0].isIntersecting) setIsVisible(true);
            }, { threshold: 0.2 });
            if (domRef.current) observer.observe(domRef.current);
            return () => observer.disconnect();
          }, []);

          return (
            <div ref={domRef} className="reveal relative flex items-center justify-center h-40 md:h-64 border-y md:border-y-0 md:border-x border-white/5 first:border-l-0 last:border-r-0 group overflow-hidden">
              <span className="absolute inset-0 flex items-center justify-center text-[5rem] md:text-[10rem] font-black text-red-600/35 select-none pointer-events-none group-hover:text-red-600/55 transition-all duration-700">
                <RollingCounter target={target} trigger={isVisible} />
              </span>
              <div className="relative z-10 text-center">
                <h3 className="text-2xl md:text-5xl font-black tracking-tighter text-white uppercase mb-1 drop-shadow-2xl">{label}</h3>
                <p className="text-[8px] md:text-[11px] font-bold tracking-[0.4em] text-gray-500 uppercase bg-black/60 px-3 py-1 backdrop-blur-sm border border-white/5 inline-block">{subLabel}</p>
              </div>
            </div>
          );
        };

        const PageHeader = ({ title, subtitle }) => (
          <header className="mb-8 md:mb-12 reveal px-4">

            <span className="text-red-600 font-mono text-[9px] md:text-[11px] font-bold tracking-[0.5em] mb-4 md:mb-6 block uppercase">{subtitle}</span>
            <h1 className="text-4xl sm:text-6xl md:text-[9vw] font-black tracking-tighter uppercase leading-[0.9] text-white italic">
              {title}
            </h1>
          </header>
        );

        // =====================================================================
        // UTAMA APLIKASI
        // =====================================================================
        const App = () => {
          const [view, setView] = useState('home'); 
          const [scrolled, setScrolled] = useState(false);
          const [currentSlide, setCurrentSlide] = useState(0);
          const [selectedTalent, setSelectedTalent] = useState(null);
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [activePersonilFilter, setActivePersonilFilter] = useState("Semua");
          const [activeProjectModal, setActiveProjectModal] = useState(null);
          
          // State untuk Notifikasi Live Chat
          const [liveNotification, setLiveNotification] = useState(null);

          const personilFilters = ["Semua", "Video & Motion", "Scriptwriter", "Website Builder", "3D & Graphic"];

          // Efek untuk sistem Notifikasi Live Activity (Berjalan setiap 10 detik sekali)
          useEffect(() => {
            const triggerNotification = () => {
              const randomClient = RANDOM_CLIENTS[Math.floor(Math.random() * RANDOM_CLIENTS.length)];
              const randomChat = CHAT_TEMPLATES[Math.floor(Math.random() * CHAT_TEMPLATES.length)];
              const targetTalent = TALENTS.find(t => t.id === randomChat.targetId);

              if (targetTalent) {
                setLiveNotification({
                  client: randomClient,
                  message: randomChat.message,
                  targetName: targetTalent.name,
                  targetNickname: targetTalent.nickname, // Nickname kustom yang akurat
                  targetImage: targetTalent.image
                });
              }

              setTimeout(() => {
                setLiveNotification(null);
              }, 6000);
            };

            const initialDelay = setTimeout(triggerNotification, 5000);
            const interval = setInterval(triggerNotification, 10000);

            return () => {
              clearTimeout(initialDelay);
              clearInterval(interval);
            };
          }, []);

          useEffect(() => {
            const observer = new IntersectionObserver((entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
              });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
            return () => observer.disconnect();
          }, [view, activePersonilFilter]);

          useEffect(() => {
            const timer = setInterval(() => {
              if (view === 'home') setCurrentSlide((prev) => (prev + 1) % FEATURED_PROJECTS.length);
            }, 8000);
            return () => clearInterval(timer);
          }, [view]);

          useEffect(() => {
            const handleScroll = () => setScrolled(window.scrollY > 80);
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          const navigateTo = (page) => {
            setView(page);
            window.scrollTo({top: 0, behavior: 'smooth'});
            setIsMenuOpen(false);
          };

                          </div>

                        HANASKAR.ID lahir dari visi kolektif tim inti di jurusan <strong>ANIMASI SMK</strong>. Perjalanan kami dimulai dari bangku sekolah, di mana kami tidak hanya belajar teknik, tetapi juga tumbuh bersama mengasah intuisi kreatif hingga mencapai bangku kelas 12.
                      </p>
                      <p>
                        Masing-masing dari kami membawa keahlian unik sebagai jagoan di bidangnya—mulai dari <strong>Video Editing</strong> sinematik hingga <strong>3D Art</strong> yang memukau. Kami terus bertumbuh sesuai gairah dan keinginan kami dalam mengeksplorasi dunia media digital tanpa batas.
                      </p>
                    </div>
                    <div className="lg:col-span-5 space-y-8 reveal">
                      {/* FIXED: Removed "//" prefix from workflow subtitle */}
                      <h3 className="text-xs font-black tracking-[0.4em] text-white uppercase border-b border-white/10 pb-4">WORKFLOW PIPELINE</h3>
                      <div className="relative border-l border-white/5 pl-6 space-y-8">
                        <div className="relative">
                          <span className="absolute -left-[31px] top-1.5 w-2 h-2 rounded-full bg-red-600"></span>
                          <h4 className="text-[11px] font-black tracking-widest text-white uppercase mb-1">01. Brainstorm & Concept</h4>
                          <p className="text-xs text-gray-500">Mencari ide-ide radikal, menulis draf naskah kasar, serta mematangkan konsep dasar.</p>
                        </div>
                        <div className="relative">
                          <span className="absolute -left-[31px] top-1.5 w-2 h-2 rounded-full bg-red-600"></span>

                      </div>

                                {item}
                              </li>
                            ))}
                          </ul>
                        </div>
                      </div>

                    <span className="relative flex h-3 w-3">
                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span className="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>

                      <div key={project.id} className="reveal bg-zinc-950/60 border border-white/5 p-6 md:p-8 rounded-sm hover:border-green-500/20 transition-all duration-500 space-y-6">

                            <span className="text-[9px] font-mono font-bold text-gray-500 tracking-wider block">{project.id}</span>

                                        {selectedTalent.experience && selectedTalent.experience.length > 0 ? (
                                            selectedTalent.experience.map(exp => (<span key={exp} className="px-3 py-1.5 bg-blue-600/10 border border-blue-600/20 text-blue-400 text-[10px] font-bold rounded-sm uppercase tracking-wider">{exp}</span>))

                                <div className="space-y-4">
                                    <div className="flex items-center gap-3 text-gray-500"><Icon name="Scissors" size={18} /><h4 className="text-[11px] font-black uppercase tracking-[0.3em]">Software Proficiency</h4></div>

                    <div className="space-y-6 md:space-y-8">

                    <div className="space-y-6 md:space-y-8"><h4 className="text-lg md:text-xl font-bold">Newsletter signup</h4><div className="space-y-4 md:space-y-6"><div className="relative group max-w-md mx-auto md:mx-0"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"><Icon name="Mail" size={16} /></span><input type="email" placeholder="Enter Your Email Address" className="w-full bg-[#111] border border-white/5 py-3 md:py-4 pl-10 md:pl-12 pr-12 md:pr-16 text-xs md:text-sm focus:outline-none focus:border-white/20 transition-all rounded-sm text-white" /><button className="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-500 p-1.5 md:p-2.5 transition-all rounded-sm"><Icon name="Send" size={16} className="text-white" /></button></div><label className="flex items-center justify-center md:justify-start gap-3 cursor-pointer group px-4 md:px-0"><input type="checkbox" className="w-4 h-4 border-white/10 bg-transparent rounded-sm shrink-0" /><span className="text-[10px] text-gray-500 group-hover:text-gray-400">I agree to the <span className="underline">Privacy Policy</span>.</span></label></div></div>
                  </div>
                  <div className="pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 text-[8px] md:text-[10px] font-bold tracking-[0.2em] md:tracking-[0.3em] text-gray-700 uppercase"><p>HANASKAR.ID © 2026. All rights reserved.</p><p>hanaskar.id 2026</p></div>
                </div>
              </footer>
            </div>

        };

        // Render Utama React 18
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
