    <style>
        .reveal { 
            opacity: 0; 
            transform: translateY(30px); 
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); 
            filter: blur(5px); 
        }
        .reveal.visible { 
            opacity: 1; 
            transform: translateY(0); 
            filter: blur(0); 
        }

        .animate-slide-right { 
            animation: slideRight 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        .animate-draw-stroke { 
            animation: drawStroke 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            opacity: 0; 
        }

        @keyframes slideRight { 
            0% { transform: translateX(-30px); opacity: 0; filter: blur(5px); } 
            100% { transform: translateX(0); opacity: 1; filter: blur(0); } 
        }
        @keyframes drawStroke { 
            0% { opacity: 0; transform: scale(1.05); filter: blur(10px); } 
            100% { opacity: 1; transform: scale(1); filter: blur(0); } 
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #dc2626; }
    </style>

        const RollingCounter = ({ target, trigger }) => {
          const [count, setCount] = useState(0);
          useEffect(() => {
            if (!trigger) return;
            let startTimestamp = null;
            const duration = 2000;
            const step = (timestamp) => {
              if (!startTimestamp) startTimestamp = timestamp;
              const progress = Math.min((timestamp - startTimestamp) / duration, 1);
              const easeOutQuad = (t) => t * (2 - t);
              setCount(Math.floor(easeOutQuad(progress) * target));
              if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
          }, [target, trigger]);
          return <span>{count}</span>;
        };

        const StatItem = ({ target, label, subLabel }) => {
          const [isVisible, setIsVisible] = useState(false);
          const domRef = useRef();
          useEffect(() => {
            const observer = new IntersectionObserver(entries => {
              if (entries[0].isIntersecting) setIsVisible(true);
            }, { threshold: 0.2 });
            if (domRef.current) observer.observe(domRef.current);
            return () => observer.disconnect();
          }, []);

          return (
            <div ref={domRef} className="reveal relative flex items-center justify-center h-40 md:h-64 border-y md:border-y-0 md:border-x border-white/5 first:border-l-0 last:border-r-0 group overflow-hidden">

              );
              case 'layanan': return (
                <GenericView title="LAYANAN KAMI." subtitle="SERVICES_INDEX">
                  <p>Kami menyediakan solusi visual komprehensif mulai dari Video Production, Motion Graphics, hingga Post-Production berskala besar.</p>
                </GenericView>
              );
              case 'onair': return (
                <GenericView title="ON AIR STATUS." subtitle="BROADCAST_LIVE">
                    <div className="flex items-center gap-6 text-green-500 mb-10">
                        <Icon name="Radio" className="animate-pulse" size={32} />
                        <span className="text-xl md:text-2xl font-black uppercase tracking-widest">Sistem Sedang Siaran</span>
                    </div>
                </GenericView>
              );
              case 'detail': return (
                <main className="pt-32 md:pt-40 pb-40 px-6 max-w-7xl mx-auto min-h-screen animate-in fade-in duration-1000">
                     <button onClick={() => navigateTo('personil')} className="flex items-center gap-3 text-red-600 font-bold uppercase tracking-widest text-[10px] mb-12 hover:translate-x-[-5px] transition-transform"><Icon name="ArrowLeft" size={16} /> KEMBALI KE PERSONIL</button>
                     <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 md:gap-20 items-start">
                        <div className="lg:col-span-7">
                            <div className="relative aspect-[4/5] overflow-hidden bg-zinc-900 border border-white/10 shadow-2xl rounded-sm">
                                <img 
                                  src={selectedTalent.image} 
                                  alt={selectedTalent.name} 
                                  className="w-full h-full object-cover opacity-100" 
                                  onError={(e) => { 
                                    if (!e.target.dataset.retried) {
                                      e.target.dataset.retried = "true";
                                      const origUrl = e.target.src;
                                      if (origUrl.includes("dl.dropboxusercontent.com")) {
                                        e.target.src = origUrl.replace("dl.dropboxusercontent.com", "www.dropbox.com");
                                        return;
                                      }
                                    }
                                    e.target.onerror = null; 
                                    e.target.src = `https://placehold.co/400x500/111111/ffffff?text=${encodeURIComponent(selectedTalent.name)}`; 
                                  }}
                                />
                            </div>
                        </div>
                        <div className="lg:col-span-5 md:sticky md:top-40 space-y-8 md:space-y-12">
                            <div className="flex justify-between items-start">
                                <div>
                                    <h1 className="text-4xl md:text-6xl font-black tracking-tighter uppercase leading-none text-white">{selectedTalent.name}</h1>
                                </div>
                                <div className="flex flex-col items-end">
                                    <span className="text-[8px] font-bold text-gray-600 uppercase tracking-widest mb-1">Status</span>
                                    <div className="flex items-center gap-2 px-3 py-1 bg-green-500/10 border border-green-500/20 rounded-full">
                                        <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                                        <span className="text-[9px] font-black text-green-500 uppercase tracking-tighter">{selectedTalent.availability}</span>
                                    </div>
                                </div>
                            </div>

                            <p className="text-lg md:text-xl text-gray-500 italic border-l-2 border-red-600 pl-6 md:pl-8">{selectedTalent.specialty}</p>
                            <p className="text-gray-400 font-light leading-relaxed">{selectedTalent.about}</p>

                            <div className="space-y-8 pt-8 border-t border-white/5">
                                <div className="space-y-4">
                                    <div className="flex items-center gap-3 text-gray-500"><Icon name="Clapperboard" size={18} /><h4 className="text-[11px] font-black uppercase tracking-[0.3em]">Format Experience</h4></div>
                                    <div className="flex flex-wrap gap-2">
                                        {selectedTalent.experience && selectedTalent.experience.length > 0 ? (
                                            selectedTalent.experience.map(exp => (<span key={exp} className="px-3 py-1.5 bg-blue-600/10 border border-blue-600/20 text-blue-400 text-[10px] font-bold rounded-sm uppercase tracking-wider">{exp}</span>))
                                        ) : (<span className="text-gray-700 italic text-xs">Data belum tersedia...</span>)}
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <div className="flex items-center gap-3 text-gray-500"><Icon name="Scissors" size={18} /><h4 className="text-[11px] font-black uppercase tracking-[0.3em]">Software Proficiency</h4></div>
                                    <div className="flex flex-wrap gap-2">
                                        {selectedTalent.software && selectedTalent.software.length > 0 ? (
                                            selectedTalent.software.map(sw => (<span key={sw} className="px-3 py-1.5 bg-purple-600/10 border border-purple-600/20 text-purple-400 text-[10px] font-bold rounded-sm uppercase tracking-wider">{sw}</span>))
                                        ) : (<span className="text-gray-700 italic text-xs">Data belum tersedia...</span>)}
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-6 mt-10">
                                <button onClick={() => { if (selectedTalent.portfolioUrl && selectedTalent.portfolioUrl !== "#") { window.open(selectedTalent.portfolioUrl, '_blank'); } }} className="group relative overflow-hidden bg-white text-black px-10 md:px-12 py-5 md:py-6 text-[11px] font-black uppercase tracking-[0.6em] flex items-center justify-between w-full shadow-2xl transition-all">
                                    <span className="relative z-10 group-hover:text-white transition-colors duration-500">LIHAT PORTOFOLIO</span>
                                    <Icon name="ArrowRight" size={20} className="relative z-10 group-hover:text-white transition-colors duration-500 group-hover:translate-x-2" />
                                    <div className="absolute inset-0 bg-red-600 translate-y-full group-hover:translate-y-0 transition-transform duration-500 ease-out"></div>
                                </button>
                                <div className="flex items-center justify-center gap-8 pt-4 border-t border-white/5">
                                    <a href={selectedTalent.socials?.wa} target="_blank" className="text-gray-500 hover:text-green-500 transition-all scale-100 hover:scale-125 flex flex-col items-center gap-2"><Icon name="MessageCircle" size={22} /><span className="text-[7px] font-bold uppercase tracking-widest opacity-0 hover:opacity-100 transition-opacity">WhatsApp</span></a>
                                    <a href={selectedTalent.socials?.ig} target="_blank" className="text-gray-500 hover:text-pink-500 transition-all scale-100 hover:scale-125 flex flex-col items-center gap-2"><Icon name="Instagram" size={22} /><span className="text-[7px] font-bold uppercase tracking-widest opacity-0 hover:opacity-100 transition-opacity">Instagram</span></a>
                                    <a href={selectedTalent.socials?.tt} target="_blank" className="text-gray-500 hover:text-white transition-all scale-100 hover:scale-125 flex flex-col items-center gap-2"><Icon name="TikTok" size={22} /><span className="text-[7px] font-bold uppercase tracking-widest opacity-0 hover:opacity-100 transition-opacity">TikTok</span></a>
                                </div>
                            </div>
                        </div>
                     </div>
                </main>
              );
              case 'home':
              default:
                return (
                  <>
                    <header className="relative w-full h-[100svh] flex flex-col justify-end overflow-hidden bg-black" id="hero">
                      {FEATURED_PROJECTS.map((proj, idx) => (
                        <div key={proj.id} className={`absolute inset-0 transition-all duration-1000 ease-in-out transform ${idx === currentSlide ? 'opacity-40 scale-100' : 'opacity-0 scale-110'}`}>
                          {proj.video ? (
                            <video 
                              src={proj.video} 
                              autoPlay 
                              muted 
                              loop 
                              playsInline 
                              className="w-full h-full object-cover grayscale" 
                            />
                          ) : (
                            <img src={proj.image} className="w-full h-full object-cover grayscale" alt={proj.title} />
                          )}
                          <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black opacity-90"></div>
                        </div>
                      ))}
                      <div className="flex-1 flex flex-col justify-center max-w-7xl mx-auto w-full px-6 md:px-8 relative z-10 pt-20">
                        <div className="animate-in fade-in duration-1000">
                          <div className="flex flex-row items-center mb-4 overflow-visible py-2"><h1 className="text-5xl sm:text-7xl md:text-[11vw] font-black tracking-tighter uppercase leading-[0.8] italic flex whitespace-nowrap"><span className="text-white animate-slide-right">HANA</span><span className="text-transparent animate-draw-stroke ml-[-2px] md:ml-[-5px]" style={{ WebkitTextStroke: "1px #dc2626" }}>SKAR.</span></h1></div>
                          <h2 className="text-2xl md:text-[4vw] font-bold tracking-tighter uppercase leading-none text-gray-500/80 mt-2">{FEATURED_PROJECTS[currentSlide].title}</h2>
                          <div className="flex mt-8 md:mt-12 max-w-2xl">
                             <div className="w-1 bg-red-600 mr-4 md:mr-8 shrink-0"></div>
                             <div className="flex flex-col items-start gap-6 md:gap-10">
                                <p className="text-sm md:text-xl text-gray-300 font-light leading-relaxed">{FEATURED_PROJECTS[currentSlide].desc}</p>
                                <div className="flex gap-4">
                                    <button onClick={() => navigateTo('personil')} className="bg-white text-black px-8 md:px-12 py-3 md:py-5 text-[9px] md:text-[11px] font-bold uppercase tracking-[0.4em] transition-all hover:bg-red-600 hover:text-white shadow-2xl">LIHAT PERSONIL</button>
                                    {FEATURED_PROJECTS[currentSlide].video && (
                                        <button onClick={() => setActiveProjectModal(FEATURED_PROJECTS[currentSlide])} className="bg-transparent border border-white/20 text-white hover:border-red-600 hover:bg-red-600/10 px-6 md:px-10 py-3 md:py-5 text-[9px] md:text-[11px] font-bold uppercase tracking-[0.4em] transition-all flex items-center gap-3">
                                            <Icon name="Play" size={14} className="fill-current" /> PLAY TEASER
                                        </button>
                                    )}
                                </div>
                             </div>
                          </div>
                        </div>
                      </div>
                      <div className="relative z-20 w-full bg-black/60 backdrop-blur-md border-t border-white/10 shrink-0">
                        <div className="max-w-7xl mx-auto grid grid-cols-3">
                          {FEATURED_PROJECTS.map((proj, idx) => (
                            <button key={proj.id} onClick={() => setCurrentSlide(idx)} className={`relative p-4 md:p-14 flex flex-col items-start gap-2 md:gap-4 transition-all border-r border-white/5 last:border-0 ${idx === currentSlide ? 'bg-red-600/10' : 'hover:bg-white/5'}`}><div className="flex items-center gap-3 md:gap-6"><span className={`text-base md:text-4xl font-black ${idx === currentSlide ? 'text-red-600' : 'text-gray-800'} transition-all duration-500`}>{proj.id}</span><h4 className={`text-[7px] md:text-[11px] font-black uppercase tracking-widest text-left leading-tight ${idx === currentSlide ? 'text-white' : 'text-gray-600'}`}>{proj.title}</h4></div><div className={`absolute bottom-0 left-0 h-[2px] md:h-[4px] transition-all duration-700 ease-out ${idx === currentSlide ? 'bg-red-600 w-full' : 'bg-transparent w-0'}`}></div></button>
                          ))}
                        </div>
                      </div>
                    </header>
                    
                    {/* GALERI PROYEK */}
                    <section className="bg-black py-24 md:py-40 px-6">
                      <div className="max-w-7xl mx-auto">
                         <div className="reveal mb-20 text-center md:text-left"><span className="text-red-600 font-mono text-[11px] font-bold tracking-[0.6em] mb-4 block uppercase">// FEATURED_GALLERY</span><h2 className="text-4xl md:text-[7vw] font-black tracking-tighter uppercase leading-[0.9]">KARYA <br /> <span className="text-transparent italic" style={{ WebkitTextStroke: "1px white" }}>TERBAIK KAMI.</span></h2></div>
                         <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-12">
                            {PORTFOLIO_WORKS.map((work) => {
                              return (
                                <div key={work.id} onClick={() => setActiveProjectModal(work)} className="reveal relative aspect-[4/3] overflow-hidden group cursor-pointer rounded-sm bg-zinc-950 border border-white/5 shadow-2xl">
                                    <div className="w-full h-full flex flex-col items-center justify-center bg-[#0d0d0d] p-6 transition-all duration-700 group-hover:bg-black">
                                        <span className="text-[8px] md:text-[9px] font-bold tracking-[0.4em] text-zinc-600 mb-3">// {work.category.toUpperCase()}</span>
                                        <h3 className="text-xl md:text-2xl font-black tracking-tighter uppercase text-center text-zinc-500 transition-colors duration-500 italic max-w-xs leading-none">
                                            {work.title}
                                        </h3>
                                        <div className="mt-4 w-8 h-[2px] bg-zinc-800 transition-all duration-500 group-hover:bg-red-600 group-hover:w-16"></div>
                                    </div>
                                    
                                    <div className="absolute inset-0 translate-y-full group-hover:translate-y-0 transition-transform duration-500 ease-out flex flex-col items-center justify-center p-6 md:p-12 text-center bg-red-600 text-white">
                                        <span className="text-[8px] md:text-[10px] font-black tracking-[0.3em] uppercase mb-2 md:mb-4 text-white/80">{work.category}</span>
                                        <h3 className="text-xl md:text-2xl font-black tracking-tighter uppercase mb-1 md:mb-2 leading-tight">{work.title}</h3>
                                        <p className="text-[9px] md:text-[11px] font-bold tracking-widest uppercase mb-4 md:mb-8 text-white/60">{work.client}</p>
                                        <div className="w-10 h-10 md:w-12 md:h-12 rounded-full border border-white/20 flex items-center justify-center transition-all group-hover:bg-white group-hover:border-white">
                                            <Icon name="ArrowRight" size={18} className="text-white group-hover:text-red-600 transition-colors" />
                                        </div>
                                    </div>
                                </div>
                              );
                            })}
                         </div>
                      </div>
                    </section>
                    
                    <section className="bg-black border-t border-white/5 py-12 md:py-24" id="stats"><div className="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-0"><StatItem target={132} label="PROYEK" subLabel="SELESAI" /><StatItem target={59} label="KLIEN" subLabel="PUAS" /><StatItem target={3} label="TAHUN" subLabel="PENGALAMAN" /></div></section>
                  </>
                );
            }
          };

          return (
            <div className="min-h-screen bg-[#050505] text-white font-sans selection:bg-red-600 relative overflow-x-hidden">
              <div className="fixed inset-0 pointer-events-none z-[200] opacity-[0.03] bg-[url('https://grainy-gradients.vercel.app/noise.svg')]"></div>
              <nav className={`fixed top-0 w-full z-[150] transition-all duration-700 transform ${scrolled || view !== 'home' ? 'translate-y-0 opacity-100 bg-black/95 py-3 md:py-5 border-b border-white/10 shadow-2xl' : 'translate-y-[-100%] opacity-0 pointer-events-none'}`}>
                <div className="max-w-7xl mx-auto px-6 md:px-8 flex justify-between items-center h-12 md:h-10">
                  <div className="flex items-center cursor-pointer" onClick={() => navigateTo('home')}><h1 className="text-base md:text-xl font-black uppercase tracking-tighter italic flex"><span className="text-white">HANA</span><span className="text-transparent" style={{ WebkitTextStroke: "1px #dc2626" }}>SKAR.</span></h1><span className="text-[10px] md:text-sm font-light italic ml-2 tracking-[0.2em] uppercase text-gray-500">PROJECT</span></div>
                  <div className="flex items-center gap-6"><div className="hidden lg:flex space-x-10 text-[10px] font-bold uppercase tracking-[0.3em]"><button onClick={() => navigateTo('home')} className={`${view === 'home' ? 'text-red-600 font-black' : 'hover:text-red-600'} transition-all`}>BERANDA</button><button onClick={() => navigateTo('personil')} className={`${view === 'personil' ? 'text-red-600 font-black' : 'hover:text-red-600'} transition-all`}>PERSONIL</button><button onClick={() => navigateTo('tentang')} className={`${view === 'tentang' ? 'text-red-600 font-black' : 'hover:text-red-600'} transition-all`}>TENTANG</button><button onClick={() => navigateTo('layanan')} className={`${view === 'layanan' ? 'text-red-600 font-black' : 'hover:text-red-600'} transition-all`}>LAYANAN</button><button onClick={() => navigateTo('onair')} className={`${view === 'onair' ? 'text-red-600 font-black' : 'hover:text-red-600'} transition-all`}><span className="text-red-600">ON</span>AIR</button></div><button onClick={() => setIsMenuOpen(true)} className="lg:hidden text-white"><Icon name="Menu" size={20}/></button></div>
                </div>
              </nav>
              <div className={`fixed inset-0 z-[250] bg-black transition-transform duration-700 ${isMenuOpen ? 'translate-y-0' : '-translate-y-full'} lg:hidden flex flex-col items-center justify-center gap-8 text-center`}><button onClick={() => setIsMenuOpen(false)} className="absolute top-10 right-8 text-white"><Icon name="X" size={32}/></button>{["BERANDA", "PERSONIL", "TENTANG", "LAYANAN", "ON AIR"].map(item => (<button key={item} onClick={() => navigateTo(item.toLowerCase().replace(' ', ''))} className="text-2xl font-black uppercase tracking-widest hover:text-red-600 transition-colors text-white text-center">{item}</button>))}</div>
              {renderContent()}

              {/* =====================================================================
                  MODAL POP-UP PREVIEW PORTFOLIO PREMIUM (DENGAN PEMUTAR VIDEO)
                  ===================================================================== */}
              {activeProjectModal && (
                <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 md:p-10 bg-black/90 backdrop-blur-md animate-in fade-in duration-300">
                  <div className="relative w-full max-w-5xl bg-zinc-950 border border-white/10 rounded-sm overflow-hidden flex flex-col lg:flex-row max-h-[90vh] md:max-h-[80vh] shadow-2xl">
                    <button 
                      onClick={() => setActiveProjectModal(null)} 
                      className="absolute top-4 right-4 z-50 bg-black/60 hover:bg-red-600 text-white p-2 rounded-full border border-white/10 transition-colors"
                    >
                      <Icon name="X" size={20} />
                    </button>

                    <div className="w-full lg:w-3/5 bg-black aspect-video lg:aspect-auto lg:min-h-[500px] flex items-center justify-center overflow-hidden">
                      {activeProjectModal.video ? (
                        <video 
                          src={activeProjectModal.video} 
                          controls 
                          autoPlay 
                          className="w-full h-full object-contain"
                        />
                      ) : (
                        <img 
                          src={activeProjectModal.image} 
                          className="w-full h-full object-cover" 
                          alt={activeProjectModal.title} 
                        />
                      )}
                    </div>

                    <div className="w-full lg:w-2/5 p-6 md:p-10 flex flex-col justify-between overflow-y-auto bg-zinc-950">
                      <div className="space-y-6">
                        <div>
                          <span className="text-red-600 font-mono text-[10px] font-bold tracking-[0.3em] uppercase block mb-2">// {activeProjectModal.category}</span>
                          <h2 className="text-2xl md:text-3xl font-black tracking-tighter uppercase text-white leading-tight">{activeProjectModal.title}</h2>
                          <p className="text-xs font-bold text-gray-500 uppercase tracking-widest mt-1">Klien: {activeProjectModal.client}</p>
                        </div>
                        <p className="text-sm text-gray-400 font-light leading-relaxed">
                          {activeProjectModal.desc || "Sebuah dedikasi karya visual berkualitas tinggi yang dikerjakan secara presisi oleh tim HANASKAR, memastikan setiap detail menyampaikan emosi, estetika, dan pesan yang kuat."}
                        </p>
                      </div>

                      <div className="pt-8 border-t border-white/5 flex items-center justify-between">
                        <span className="text-[9px] font-bold text-gray-600 uppercase tracking-[0.2em]">HANASKAR COLLECTIVE</span>
                        <button 
                          onClick={() => setActiveProjectModal(null)}
                          className="text-xs font-black uppercase tracking-widest text-red-600 hover:text-white transition-colors"
                        >
                          TUTUP PREVIEW
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              <footer className="bg-black pt-20 md:pt-32 pb-16 px-6 border-t border-white/5 reveal">
                <div className="max-w-7xl mx-auto text-center md:text-left">
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 md:gap-16 mb-20 text-white">
                    <div className="space-y-6 md:space-y-8"><h4 className="text-lg md:text-xl font-bold">Office</h4><div className="space-y-3 md:space-y-4 text-gray-500 text-xs md:text-sm leading-relaxed uppercase font-bold tracking-widest"><p>Depok, Jawa Barat,<br/>Indonesia</p><a href="mailto:info@hanaskar.id" className="block text-white hover:text-red-600 transition-colors border-b border-white/10 pb-1 w-fit mx-auto md:mx-0">info@hanaskar.id</a><p className="text-white font-bold tracking-widest">+6281293555379</p></div></div>
                    <div className="space-y-6 md:space-y-8"><h4 className="text-lg md:text-xl font-bold">Links</h4><ul className="space-y-3 md:space-y-4 text-gray-500 text-xs md:text-sm uppercase font-bold tracking-widest"><li><button onClick={() => navigateTo('home')} className="hover:text-white transition-all">Home</button></li><li><button onClick={() => navigateTo('layanan')} className="hover:text-white transition-all">Services</button></li><li><button onClick={() => navigateTo('tentang')} className="hover:text-white transition-all">About Us</button></li></ul></div>
                    <div className="space-y-6 md:space-y-8"><h4 className="text-lg md:text-xl font-bold">Socials</h4><ul className="space-y-3 md:space-y-4 text-gray-500 text-xs md:text-sm uppercase font-bold tracking-widest"><li><a href="#" className="hover:text-white transition-all">Facebook</a></li><li><a href="#" className="hover:text-white transition-all">Instagram</a></li></ul></div>
                    <div className="space-y-6 md:space-y-8"><h4 className="text-lg md:text-xl font-bold">Newsletter signup</h4><div className="space-y-4 md:space-y-6"><div className="relative group max-w-md mx-auto md:mx-0"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"><Icon name="Mail" size={16} /></span><input type="email" placeholder="Enter Your Email Address" className="w-full bg-[#111] border border-white/5 py-3 md:py-4 pl-10 md:pl-12 pr-12 md:pr-16 text-xs md:text-sm focus:outline-none focus:border-white/20 transition-all rounded-sm text-white" /><button className="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-500 p-1.5 md:p-2.5 transition-all rounded-sm"><Icon name="Send" size={16} className="text-white" /></button></div><label className="flex items-center justify-center md:justify-start gap-3 cursor-pointer group px-4 md:px-0"><input type="checkbox" className="w-4 h-4 border-white/10 bg-transparent rounded-sm shrink-0" /><span className="text-[10px] text-gray-500 group-hover:text-gray-400">I agree to the <span className="underline">Privacy Policy</span>.</span></label></div></div>
                  </div>
                  <div className="pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 text-[8px] md:text-[10px] font-bold tracking-[0.2em] md:tracking-[0.3em] text-gray-700 uppercase"><p>HANASKAR.ID © 2026. All rights reserved.</p><p>hanaskar.id 2026</p></div>
                </div>
              </footer>
            </div>
          );
        };

        // Render Utama React 18
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
